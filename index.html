<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulario de Voluntarios — Fundación Patagonia Fiel</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Montserrat', sans-serif;
    background: #F2EDE0;
    min-height: 100vh;
    padding: 2rem 1rem 3rem;
    color: #222;
  }

  .fpf-wrap {
    max-width: 680px;
    margin: 0 auto;
  }

  .fpf-header {
    background: #1a3d60;
    border-radius: 14px;
    padding: 1.75rem 2rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.25rem;
  }

  .fpf-logo {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    object-fit: contain;
    background: #F2EDE0;
    padding: 5px;
    flex-shrink: 0;
  }

  .fpf-header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 21px;
    font-weight: 600;
    color: #F2EDE0;
    margin-bottom: 4px;
    letter-spacing: 0.3px;
  }

  .fpf-header p {
    font-size: 11px;
    color: #C9A84C;
    font-weight: 600;
    letter-spacing: 0.7px;
    text-transform: uppercase;
  }

  .fpf-section {
    background: #fff;
    border: 1px solid #ddd8ce;
    border-radius: 14px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }

  .fpf-section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: #C9A84C;
    margin-bottom: 1rem;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid #e8e3d8;
  }

  .fpf-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .fpf-field {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .fpf-field.full { grid-column: 1 / -1; }

  .fpf-field label {
    font-size: 12px;
    font-weight: 500;
    color: #555;
  }

  .fpf-field input,
  .fpf-field select,
  .fpf-field textarea {
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    padding: 9px 11px;
    border: 1px solid #ccc8bf;
    border-radius: 8px;
    background: #faf8f4;
    color: #222;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    width: 100%;
  }

  .fpf-field input:focus,
  .fpf-field select:focus,
  .fpf-field textarea:focus {
    border-color: #C9A84C;
    box-shadow: 0 0 0 3px rgba(201,168,76,0.18);
  }

  .fpf-field textarea {
    resize: vertical;
    min-height: 80px;
    line-height: 1.55;
  }

  .fpf-checkgroup {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 7px;
  }

  .fpf-check {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12.5px;
    color: #333;
    cursor: pointer;
    padding: 7px 10px;
    border-radius: 8px;
    border: 1px solid #ddd8ce;
    background: #faf8f4;
    transition: border-color 0.15s;
    user-select: none;
  }

  .fpf-check:hover { border-color: #C9A84C; }

  .fpf-check input[type="checkbox"] {
    accent-color: #1a3d60;
    width: 14px;
    height: 14px;
    flex-shrink: 0;
  }

  .fpf-radio-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .fpf-radio {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12.5px;
    color: #333;
    cursor: pointer;
    padding: 6px 14px;
    border-radius: 99px;
    border: 1px solid #ddd8ce;
    background: #faf8f4;
    transition: border-color 0.15s;
    user-select: none;
  }

  .fpf-radio:hover { border-color: #C9A84C; }

  .fpf-radio input[type="radio"] {
    accent-color: #1a3d60;
    width: 13px;
    height: 13px;
    flex-shrink: 0;
  }

  .fpf-submit {
    width: 100%;
    padding: 14px;
    background: #1a3d60;
    color: #F2EDE0;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 0.25rem;
    transition: background 0.15s, transform 0.1s;
  }

  .fpf-submit:hover { background: #14324f; }
  .fpf-submit:active { transform: scale(0.99); }

  .fpf-footer {
    text-align: center;
    font-size: 11px;
    color: #888;
    margin-top: 1.25rem;
  }

  .fpf-success {
    display: none;
    background: #fff;
    border: 1px solid #ddd8ce;
    border-radius: 14px;
    padding: 3rem 2rem;
    text-align: center;
  }

  .fpf-success .check-icon {
    font-size: 48px;
    color: #C9A84C;
    margin-bottom: 1rem;
  }

  .fpf-success h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 600;
    color: #1a3d60;
    margin-bottom: 0.5rem;
  }

  .fpf-success p {
    font-size: 13.5px;
    color: #666;
  }

  .fpf-success .gold { color: #C9A84C; font-weight: 600; }

  @media (max-width: 520px) {
    .fpf-grid { grid-template-columns: 1fr; }
    .fpf-checkgroup { grid-template-columns: 1fr; }
    .fpf-header { flex-direction: column; text-align: center; }
  }
</style>
</head>
